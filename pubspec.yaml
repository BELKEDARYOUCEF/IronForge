name: ironforge
description: Premium offline-first workout logger for serious lifters.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  intl: ^0.19.0
  uuid: ^4.5.0
  fl_chart: ^0.69.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  percent_indicator: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/athletes/
    - assets/images/programs/
    - assets/images/onboarding/
    - assets/images/empty_states/
    - assets/images/ai/
    - assets/animations/
    - assets/branding/
